{% extends 'base.html' %}

{% block title %}Login | Access Your Portal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-6">Sign In</h1>
            <p class="text-muted">Enter your credentials to access your college dashboard.</p>
        </div>
        
        <div class="card card-premium p-4 p-md-5">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="name@college.edu" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-semibold">Password</label>
                        <a href="#" class="small text-decoration-none">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="mb-4 d-flex align-items-center justify-content-between">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small" for="remember">Keep me logged in</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-premium w-100 py-3 mb-3">Continue to Dashboard</button>
            </form>
            
            <p class="text-center mt-3 mb-0 small text-muted">
                New institution? <a href="{% url 'register_college' %}" class="fw-bold text-decoration-none">Register here</a>
            </p>
        </div>
        
        <div class="text-center mt-5 opacity-50">
            <p class="small">© 2026 Campus Manager SaaS Inc.</p>
        </div>
    </div>
</div>
{% endblock %}
