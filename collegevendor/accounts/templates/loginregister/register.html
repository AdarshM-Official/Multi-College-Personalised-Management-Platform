<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account | Professional Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-focus: #3b82f6;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 450px; /* Slightly wider for registration */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
            animation: slideUp 0.5s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Form Layout */
        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #fff;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Password Requirement Hint */
        .password-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .terms-text {
            font-size: 13px;
            color: var(--text-muted);
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .terms-text input[type="checkbox"] {
            width: auto;
            margin-top: 2px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 32px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive tweak */
        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
                border-radius: 0;
                border: none;
                box-shadow: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="header">
            <h1>Create an account</h1>
            <p>Start your 14-day free trial today.</p>
        </div>

        <form action="{% url 'register' %}" method="post">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="johndoe" required>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" name="email" placeholder="john@company.com" required>
                </div>

                <div class="form-group">
                    <label for="password1">Password</label>
                    <input type="password" id="password1" name="password1" placeholder="••••••••" required>
                    <p class="password-hint">Must be at least 8 characters.</p>
                </div>

                <div class="form-group">
                    <label for="password2">Confirm Password</label>
                    <input type="password" id="password2" name="password2" placeholder="••••••••" required>
                </div>
            </div>

            <label class="terms-text">
                <input type="checkbox" required>
                <span>I agree to the <a href="#" style="color: var(--primary); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--primary); text-decoration: none;">Privacy Policy</a>.</span>
            </label>

            <button type="submit" class="btn-submit">Create account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="{% url 'login' %}">Log in</a>
        </div>
    </div>

</body>
</html>
